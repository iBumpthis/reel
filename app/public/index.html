<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reel</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/library.css">
</head>
<body>

  <header class="app-header">
    <div class="app-header-left">
      <span class="app-title">Reel</span>
      <span class="app-version" id="appVersion">—</span>
    </div>
    <div class="app-header-right">
      <button id="scanBtn">Scan</button>
      <input type="search" id="searchInput" class="search-input"
             placeholder="Search library..." autocomplete="off">
    </div>
  </header>

  <main class="app-content">

    <div class="filter-bar" id="filterBar">
      <select id="libFilter"><option value="">All libraries</option></select>
      <select id="typeFilter">
        <option value="">All types</option>
        <option value="audio">Audio</option>
        <option value="video">Video</option>
      </select>
      <select id="extFilter"><option value="">All formats</option></select>
      <select id="sortField">
        <option value="mtime">Date modified</option>
        <option value="title">Title</option>
        <option value="artist">Artist</option>
        <option value="year">Year</option>
        <option value="size">Size</option>
        <option value="created">Date added</option>
      </select>
      <select id="sortOrder">
        <option value="desc">Newest first</option>
        <option value="asc">Oldest first</option>
      </select>
      <div class="filter-tags" id="activeTagFilters"></div>
    </div>

    <div class="status-bar">
      <span id="resultCount">—</span>
      <span class="scan-status" id="scanStatus"></span>
    </div>

    <div id="mediaGrid" class="media-grid"></div>

    <div id="loadMore" class="load-more hidden">
      <button id="loadMoreBtn">Load More</button>
    </div>

  </main>

  <!-- CSV Import Overlay -->
  <div id="importOverlay" class="overlay hidden">
    <div class="overlay-backdrop" data-close="importOverlay"></div>
    <div class="overlay-panel">
      <div class="overlay-header">
        <span class="overlay-title">Import Metadata (CSV)</span>
        <button class="overlay-close" data-close="importOverlay">&#10005;</button>
      </div>
      <p class="text-sm text-muted" style="margin-bottom: 12px;">
        Paste CSV with columns: <code>filename</code>, <code>title</code>,
        <code>artist</code>, <code>year</code>, <code>description</code>,
        <code>tags</code> (comma-separated). Matches on filename.
      </p>
      <textarea id="importText" class="mono"
        placeholder="filename,title,artist,year,description,tags&#10;my-set.mp4,Live Set,DJ Name,2024,Great show,electronic,live"></textarea>
      <div id="importResult" class="import-preview hidden"></div>
      <div class="overlay-footer">
        <span id="importStatus" class="edit-status"></span>
        <button id="importBtn" class="btn-accent">Import</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <footer class="app-footer">
    Reel <span id="footerVersion">—</span>
    &nbsp;|&nbsp; <a href="#" id="importLink">Import CSV</a>
    &nbsp;|&nbsp; <a href="/api/export?format=json" target="_blank">Export JSON</a>
  </footer>

  <script type="module" src="/js/library.js"></script>
</body>
</html>
